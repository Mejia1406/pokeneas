# =============================================
# .github/workflows/docker-publish.yml
# =============================================
# Workflow de GitHub Actions:
#   - Se activa con cada push a la rama 'main'
#   - Construye la imagen Docker
#   - La publica automáticamente en DockerHub
# =============================================

name: Build & Push to DockerHub

on:
  push:
    branches:
      - main          # Sólo se ejecuta cuando hay push a main

jobs:
  build-and-push:
    name: Build Docker Image & Push to DockerHub
    runs-on: ubuntu-latest   # El runner que ejecuta el workflow

    steps:
      # ── 1. Checkout del código ──────────────────────────────────────────────
      # Descarga el código del repositorio en el runner
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Configurar QEMU (soporte multi-plataforma) ──────────────────────
      # Permite construir imágenes para distintas arquitecturas (amd64, arm64)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # ── 3. Configurar Docker Buildx ────────────────────────────────────────
      # Buildx es el builder moderno de Docker con soporte para multi-stage y caché
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 4. Login en DockerHub ──────────────────────────────────────────────
      # Usa los Secrets configurados en GitHub:
      #   Settings → Secrets → Actions → New repository secret
      #   DOCKERHUB_USERNAME : tu usuario de DockerHub
      #   DOCKERHUB_TOKEN    : Access Token generado en DockerHub
      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── 5. Extraer metadatos (tags y labels) ───────────────────────────────
      # Genera automáticamente el tag 'latest' y tags con el SHA del commit
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/pokeneas
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      # ── 6. Build y Push de la imagen ───────────────────────────────────────
      # Construye la imagen y la sube a DockerHub con los tags generados
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .                    # Contexto de build (raíz del repo)
          push: true                    # Sí publicar en DockerHub
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Caché de capas para builds más rápidos en el runner
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 7. Notificación de éxito ────────────────────────────────────────────
      - name: Image published successfully
        run: |
          echo "✅ Imagen publicada en DockerHub:"
          echo "   docker pull ${{ secrets.DOCKERHUB_USERNAME }}/pokeneas:latest"
